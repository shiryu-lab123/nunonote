<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぬのーと</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#A06A35">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F4F1EB;--accent:#A06A35;--text:#4a4034;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .card{background:#fff;border:1px solid #e4ddd0;border-radius:16px;box-shadow:0 8px 30px rgba(90,70,40,.08);padding:38px 32px;max-width:380px;width:100%;text-align:center;}
  .logo{font-size:30px;font-weight:700;color:var(--accent);letter-spacing:.08em;}
  .sub{font-size:13px;color:#8c8275;margin-top:6px;}
  .lead{font-size:13px;color:#6f655a;margin:24px 0 16px;line-height:1.8;}
  input{width:100%;padding:13px 14px;font-size:16px;border:1px solid #d8cfbf;border-radius:10px;font-family:inherit;background:#fbf9f4;color:var(--text);}
  input:focus{outline:none;border-color:var(--accent);background:#fff;}
  button{width:100%;margin-top:14px;padding:13px;font-size:15px;font-weight:500;color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:filter .15s;}
  button:hover{filter:brightness(1.06);}
  button:disabled{opacity:.55;cursor:default;}
  .err{color:#c0392b;font-size:13px;margin-top:13px;min-height:18px;}
  .note{font-size:11px;color:#a99f90;margin-top:20px;line-height:1.7;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ぬのーと</div>
  <div class="sub">あの生地、どこいった？</div>
  <div class="lead">ご購入時にお伝えしたパスワードを<br>入力してください。</div>
  <form id="f">
    <input id="pw" type="password" autocomplete="off" placeholder="パスワード" autofocus>
    <button id="b" type="submit">ひらく</button>
  </form>
  <div class="err" id="e"></div>
  <div class="note">パスワードはご購入ページ（購入後メッセージ）に記載しています。</div>
</div>

  function b64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  async function unlock(pw){
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-CBC",length:256},false,["decrypt"]);

    if(txt.indexOf(MARK)!==0) throw new Error("bad");
    return txt.slice(MARK.length);
  }

  var f=document.getElementById("f"),pw=document.getElementById("pw"),b=document.getElementById("b"),e=document.getElementById("e");

    b.disabled=true;e.textContent="";
    try{var html=await unlock(p);try{localStorage.setItem("nuno_pw",p);}catch(_){}render(html);}

  f.addEventListener("submit",function(ev){ev.preventDefault();if(pw.value)attempt(pw.value,false);});
